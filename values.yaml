# ============================================================================
# Gravitee APIM Helm Chart — values.yaml
# ============================================================================
# Components: Management API, API Gateway, Console UI, Developer Portal
# Backend: MySQL (JDBC), Elasticsearch
# ============================================================================
#
# Install:
#   helm install gravitee-apim ./helm-gravitee-apim -n gravitee -f values.yaml
#
# Upgrade:
#   helm upgrade gravitee-apim ./helm-gravitee-apim -n gravitee -f values.yaml
# ============================================================================

# ---------------------------------------------------------------------------
# GLOBAL
# ---------------------------------------------------------------------------
global:
  image:
    registry: internal-cr.nomura.com/docker
    tag: "latest"
    pullPolicy: Always
  # imagePullSecrets:
  #   - name: regcred

# ---------------------------------------------------------------------------
# JDBC CONFIGURATION (MySQL)
# ---------------------------------------------------------------------------
jdbc:
  url: "jdbc:mysql://api-gateway-poc.nomura.com:3306/api_gateway_poc"
  username: "api_gateway_admin"
  password: "mLAmUAB_3L"
  driver: "https://internal-cr.nomura.com/repository/central/mysql/mysql-connector-java/8.0.25/mysql-connector-java-8.0.25.jar"
  liquibase: true
  schema: "gravitee"
  pool:
    autoCommit: true
    connectionTimeout: 10000
    idleTimeout: 600000
    maxLifetime: 1800000
    minIdle: 10
    maxPoolSize: 10
    registerMbeans: true

# ---------------------------------------------------------------------------
# ELASTICSEARCH
# ---------------------------------------------------------------------------
es:
  enabled: true
  endpoints:
    - "http://172.18.181.36:9200"
  security:
    enabled: false
  ssl:
    verifyHostname: false
    trustAll: true

# ---------------------------------------------------------------------------
# REPOSITORY TYPES
# ---------------------------------------------------------------------------
management:
  type: jdbc

ratelimit:
  type: redis

# ---------------------------------------------------------------------------
# MANAGEMENT API
# ---------------------------------------------------------------------------
api:
  enabled: true
  name: management-api
  replicaCount: 1

  image:
    repository: graviteeio/apim-management-api

  env:
    - name: gravitee_http_cors_enabled
      value: "true"
    - name: gravitee_http_cors_allow-origin
      value: "*"
    - name: gravitee_http_cors_allow-headers
      value: "Authorization,Content-Type,X-Requested-With,Accept,Origin,Access-Control-Request-Method,Access-Control-Request-Headers,Cookie"
    - name: gravitee_http_cors_allow-methods
      value: "GET,POST,PUT,DELETE,OPTIONS"
    - name: gravitee_http_cors_exposed-headers
      value: "X-Total-Count,Set-Cookie"
    - name: gravitee_http_cors_allow-credentials
      value: "true"
    - name: gravitee_http_cookie_sameSite
      value: "Lax"
    - name: gravitee_http_cookie_secure
      value: "false"
    - name: gravitee_management_security_providers_0_type
      value: "memory"
    - name: gravitee_management_security_exclude_0
      value: "/auth/**"
    - name: gravitee_management_security_exclude_1
      value: "/organizations/*/environments/*/configuration"
    - name: gravitee_management_security_exclude_2
      value: "/_health"
    - name: gravitee_management_security_exclude_3
      value: "/info"
    - name: gravitee_management_security_exclude_4
      value: "/portal/**"
    - name: gravitee_portal_authentication_forceLogin_enabled
      value: "false"

  service:
    type: ClusterIP
    externalPort: 83
    internalPort: 8083
    technicalApiPort: 18083

  ingress:
    management:
      enabled: true
      ingressClassName: nginx
      scheme: https
      pathType: Prefix
      path: /management
      hosts:
        - amn015287.nomura.com
      tls:
        - secretName: gravitee-tls
          hosts:
            - amn015287.nomura.com
      annotations:
        nginx.ingress.kubernetes.io/ssl-redirect: "true"
        nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
        nginx.ingress.kubernetes.io/allow-http: "false"
        nginx.ingress.kubernetes.io/enable-cors: "true"
        nginx.ingress.kubernetes.io/cors-allow-origin: "*"
        nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS"
        nginx.ingress.kubernetes.io/cors-allow-headers: "Authorization, Content-Type, X-Requested-With, Accept, Origin"
        nginx.ingress.kubernetes.io/proxy-set-headers: "sandbox/sandbox-gravitee-gravitee-apim-proxy-headers"
    portal:
      enabled: true
      ingressClassName: nginx
      scheme: https
      pathType: Prefix
      path: /portal
      hosts:
        - amn015287.nomura.com
      tls:
        - secretName: gravitee-tls
          hosts:
            - amn015287.nomura.com
      annotations:
        nginx.ingress.kubernetes.io/ssl-redirect: "true"
        nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
        nginx.ingress.kubernetes.io/allow-http: "false"
        nginx.ingress.kubernetes.io/enable-cors: "true"
        nginx.ingress.kubernetes.io/cors-allow-origin: "https://amn015287.nomura.com"
        nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS, PATCH"
        nginx.ingress.kubernetes.io/proxy-set-headers: "sandbox/sandbox-gravitee-gravitee-apim-proxy-headers"
        nginx.ingress.kubernetes.io/cors-allow-headers: "DNT,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,Accept,Origin,Cookie"
        nginx.ingress.kubernetes.io/cors-expose-headers: "Content-Length,Content-Range,Set-Cookie"
        nginx.ingress.kubernetes.io/cors-allow-credentials: "true"

  persistence:
    size: 500Mi
    storageClass: "local-path"

  resources:
    requests:
      memory: "1Gi"
      cpu: "500m"
    limits:
      memory: "2Gi"
      cpu: "1"

# ---------------------------------------------------------------------------
# API GATEWAY
# ---------------------------------------------------------------------------
gateway:
  enabled: true
  name: gateway
  replicaCount: 1

  image:
    repository: graviteeio/apim-gateway

  service:
    type: ClusterIP
    externalPort: 82
    internalPort: 8082
    technicalApiPort: 18082

  ingress:
    enabled: true
    ingressClassName: nginx
    pathType: ImplementationSpecific
    path: /api/(.*)
    hosts:
      - amn015287.nomura.com
    tls:
      - secretName: gravitee-tls
        hosts:
          - amn015287.nomura.com
    annotations:
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
      nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
      nginx.ingress.kubernetes.io/allow-http: "false"
      nginx.ingress.kubernetes.io/rewrite-target: /$1

  persistence:
    size: 500Mi
    storageClass: "local-path"

  resources:
    requests:
      memory: "1Gi"
      cpu: "500m"
    limits:
      memory: "2Gi"
      cpu: "1"

# ---------------------------------------------------------------------------
# CONSOLE UI
# ---------------------------------------------------------------------------
ui:
  enabled: true
  name: console-ui
  replicaCount: 1

  image:
    repository: graviteeio/apim-management-ui

  service:
    type: ClusterIP
    externalPort: 8002
    internalPort: 8080

  ingress:
    enabled: true
    ingressClassName: nginx
    pathType: ImplementationSpecific
    path: /console-ui(/.*)?
    hosts:
      - amn015287.nomura.com
    tls:
      - secretName: gravitee-tls
        hosts:
          - amn015287.nomura.com
    annotations:
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
      nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
      nginx.ingress.kubernetes.io/allow-http: "false"
      nginx.ingress.kubernetes.io/rewrite-target: /$1

  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "250m"

  persistence:
    size: 200Mi
    storageClass: "local-path"

  managementApiUrl: "https://amn015287.nomura.com/management"

# ---------------------------------------------------------------------------
# DEVELOPER PORTAL
# ---------------------------------------------------------------------------
portal:
  enabled: true
  name: developer-portal
  replicaCount: 1

  image:
    repository: graviteeio/apim-portal-ui

  service:
    type: ClusterIP
    externalPort: 8003
    internalPort: 8080

  ingress:
    enabled: true
    ingressClassName: nginx
    pathType: ImplementationSpecific
    path: /portal-ui(/.*)?
    hosts:
      - amn015287.nomura.com
    tls:
      - secretName: gravitee-tls
        hosts:
          - amn015287.nomura.com
    annotations:
      nginx.ingress.kubernetes.io/rewrite-target: /$1
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
      nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
      nginx.ingress.kubernetes.io/allow-http: "false"

  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "250m"

  persistence:
    size: 200Mi
    storageClass: "local-path"

  portalApiUrl: "https://amn015287.nomura.com/portal"

# ---------------------------------------------------------------------------
# REDIS (In-Cluster)
# ---------------------------------------------------------------------------
redis:
  enabled: true
  name: redis
  image:
    repository: docker/redis
    tag: "7-alpine"
  service:
    port: 6379
  persistence:
    size: 1Gi
    storageClass: "local-path"
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "250m"

# ---------------------------------------------------------------------------
# ENTERPRISE LICENSE
# ---------------------------------------------------------------------------
# Create the Secret first:
#   kubectl create secret generic gravitee-license \
#     --from-file=license.key=/path/to/license.key -n sandbox
#
# Then set enabled: true below.
license:
  enabled: true
  secretName: gravitee-license

# ---------------------------------------------------------------------------
# INIT CONTAINER (JDBC Driver Download)
# ---------------------------------------------------------------------------
initContainers:
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "200m"

# ---------------------------------------------------------------------------
# SERVICE ACCOUNT
# ---------------------------------------------------------------------------
serviceAccount:
  create: true
  name: gravitee-apim

# ---------------------------------------------------------------------------
# POD SECURITY
# ---------------------------------------------------------------------------
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1001
  runAsGroup: 1001
  fsGroup: 1001
  supplementalGroups:
    - 1001

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
