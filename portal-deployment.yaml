{{- if .Values.portal.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "gravitee-apim.fullname" . }}-{{ .Values.portal.name }}
  labels:
    {{- include "gravitee-apim.labels" . | nindent 4 }}
    app.kubernetes.io/name: {{ .Values.portal.name }}
    app.kubernetes.io/component: developer-portal
spec:
  replicas: {{ .Values.portal.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Values.portal.name }}
      app.kubernetes.io/component: developer-portal
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Values.portal.name }}
        app.kubernetes.io/component: developer-portal
    spec:
      serviceAccountName: {{ include "gravitee-apim.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        supplementalGroups:
          - 1001

      initContainers:
        - name: init-portal
          image: "{{ .Values.global.image.registry }}/{{ .Values.portal.image.repository }}:{{ .Values.portal.image.tag | default .Values.global.image.tag }}"
          command:
            - sh
            - -c
            - |
              mkdir -p /rw-data/www /rw-data/nginx
              cp -a /usr/share/nginx/html/. /web-root/
              sed -i "s|\$PORTAL_API_URL|${PORTAL_API_URL}|g" /web-root/assets/config.json
              sed -i "s|\$PORTAL_API_URL|${PORTAL_API_URL}|g" /web-root/next/browser/assets/config.json 2>/dev/null
          env:
            - name: PORTAL_API_URL
              valueFrom:
                configMapKeyRef:
                  name: {{ include "gravitee-apim.fullname" . }}-config
                  key: portal-api-url
          volumeMounts:
            - name: rw-mount
              mountPath: /rw-data
            - name: html-root
              mountPath: /web-root
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true

      containers:
        - name: {{ .Values.portal.name }}
          image: "{{ .Values.global.image.registry }}/{{ .Values.portal.image.repository }}:{{ .Values.portal.image.tag | default .Values.global.image.tag }}"
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.portal.service.internalPort }}
              protocol: TCP
          env:
            - name: PORTAL_API_URL
              valueFrom:
                configMapKeyRef:
                  name: {{ include "gravitee-apim.fullname" . }}-config
                  key: portal-api-url
            - name: BASE_HREF
              value: "/portal-ui/"
          resources:
            {{- toYaml .Values.portal.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d
            - name: nginx-log
              mountPath: /var/log/nginx
            - name: rw-mount
              mountPath: /rw.mount
            - name: html-root
              mountPath: /usr/share/nginx/html
          livenessProbe:
            httpGet:
              path: /
              port: {{ .Values.portal.service.internalPort }}
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: {{ .Values.portal.service.internalPort }}
            initialDelaySeconds: 15
            periodSeconds: 10

      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 5M
        - name: nginx-cache
          emptyDir:
            sizeLimit: 10M
        - name: nginx-run
          emptyDir:
            sizeLimit: 5M
        - name: nginx-conf
          configMap:
            name: {{ include "gravitee-apim.fullname" . }}-portal-nginx
        - name: nginx-log
          emptyDir:
            sizeLimit: 5M
        - name: rw-mount
          persistentVolumeClaim:
            claimName: {{ include "gravitee-apim.fullname" . }}-portal-rw
        - name: html-root
          persistentVolumeClaim:
            claimName: {{ include "gravitee-apim.fullname" . }}-portal-html
{{- end }}
