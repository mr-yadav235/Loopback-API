{{- if .Values.keycloak.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "gravitee-apim.fullname" . }}-{{ .Values.keycloak.name }}
  labels:
    {{- include "gravitee-apim.labels" . | nindent 4 }}
    app.kubernetes.io/name: {{ .Values.keycloak.name }}
    app.kubernetes.io/component: keycloak
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Values.keycloak.name }}
      app.kubernetes.io/component: keycloak
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Values.keycloak.name }}
        app.kubernetes.io/component: keycloak
    spec:
      serviceAccountName: {{ include "gravitee-apim.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}

      containers:
        - name: {{ .Values.keycloak.name }}
          image: "{{ .Values.global.image.registry }}/{{ .Values.keycloak.image.repository }}:{{ .Values.keycloak.image.tag }}"
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          args: ["start-dev"]
          ports:
            - name: http
              containerPort: {{ .Values.keycloak.service.port }}
              protocol: TCP
          env:
            - name: KC_HTTP_RELATIVE_PATH
              value: "/auth"
            - name: KC_PROXY_HEADERS
              value: "xforwarded"
            - name: KC_HTTP_ENABLED
              value: "true"
            - name: KC_HOSTNAME_STRICT
              value: "false"
            - name: KC_DB
              value: {{ .Values.keycloak.db.vendor | quote }}
            - name: KC_DB_URL
              value: {{ .Values.keycloak.db.url | quote }}
            - name: KC_DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "gravitee-apim.fullname" . }}-secrets
                  key: jdbc-username
            - name: KC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "gravitee-apim.fullname" . }}-secrets
                  key: jdbc-password
            - name: KEYCLOAK_ADMIN
              value: {{ .Values.keycloak.admin.username | quote }}
            - name: KEYCLOAK_ADMIN_PASSWORD
              value: {{ .Values.keycloak.admin.password | quote }}
            - name: KC_HEALTH_ENABLED
              value: "true"
          resources:
            {{- toYaml .Values.keycloak.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: kc-data
              mountPath: /opt/keycloak/data
            - name: kc-conf
              mountPath: /opt/keycloak/conf
            - name: kc-cache
              mountPath: /opt/keycloak/data/tmp
          startupProbe:
            httpGet:
              path: /auth/health/ready
              port: http
            failureThreshold: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /auth/health/live
              port: http
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /auth/health/ready
              port: http
            periodSeconds: 10
            timeoutSeconds: 3

      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 100Mi
        - name: kc-data
          persistentVolumeClaim:
            claimName: {{ include "gravitee-apim.fullname" . }}-keycloak-data
        - name: kc-conf
          emptyDir:
            sizeLimit: 50Mi
        - name: kc-cache
          emptyDir:
            sizeLimit: 100Mi
{{- end }}
