# =============================================================================
# Keycloak Standalone Deployment
# =============================================================================
# Deploy:   kubectl apply -f keycloak-standalone.yaml -n sandbox
# Delete:   kubectl delete -f keycloak-standalone.yaml -n sandbox
#
# After deploy:
#   Admin console: https://amn015287.nomura.com/auth/admin
#   Login: admin / admin  (CHANGE the password after first login)
#
# Then configure Gravitee OIDC via Console UI:
#   Organization Settings > Authentication > Add identity provider > OpenID Connect
# =============================================================================

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: keycloak-data
  labels:
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/component: keycloak
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: "local-path"
  resources:
    requests:
      storage: 1Gi

---
apiVersion: v1
kind: Service
metadata:
  name: keycloak
  labels:
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/component: keycloak
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/component: keycloak

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  labels:
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/component: keycloak
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: keycloak
      app.kubernetes.io/component: keycloak
  template:
    metadata:
      labels:
        app.kubernetes.io/name: keycloak
        app.kubernetes.io/component: keycloak
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        supplementalGroups:
          - 1001
      containers:
        - name: keycloak
          image: internal-cr.nomura.com/gcr/s2-infra/s2images/s2-keycloak:26.2.0.sel3
          imagePullPolicy: Always
          args: ["start-dev"]
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: KC_HTTP_RELATIVE_PATH
              value: "/auth"
            - name: KC_PROXY_HEADERS
              value: "xforwarded"
            - name: KC_HTTP_ENABLED
              value: "true"
            - name: KC_HOSTNAME_STRICT
              value: "false"
            # --- Database (same MySQL as Gravitee) ---
            - name: KC_DB
              value: "mysql"
            - name: KC_DB_URL
              value: "jdbc:mysql://api-gateway-poc.nomura.com:3306/api_gateway_poc"
            - name: KC_DB_USERNAME
              value: "api_gateway_admin"
            - name: KC_DB_PASSWORD
              value: "mLAmUAB_3L"
            # --- Admin credentials ---
            - name: KEYCLOAK_ADMIN
              value: "admin"
            - name: KEYCLOAK_ADMIN_PASSWORD
              value: "admin"
            - name: KC_HEALTH_ENABLED
              value: "true"
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: kc-data
              mountPath: /opt/keycloak/data
            - name: kc-conf
              mountPath: /opt/keycloak/conf
            - name: kc-quarkus
              mountPath: /opt/keycloak/lib/quarkus
            - name: kc-providers
              mountPath: /opt/keycloak/providers
          startupProbe:
            httpGet:
              path: /auth/health/ready
              port: http
            failureThreshold: 60
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /auth/health/live
              port: http
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /auth/health/ready
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 50M
        - name: kc-data
          persistentVolumeClaim:
            claimName: keycloak-data
        - name: kc-conf
          emptyDir:
            sizeLimit: 50M
        - name: kc-quarkus
          emptyDir:
            sizeLimit: 50M
        - name: kc-providers
          emptyDir:
            sizeLimit: 50M

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: keycloak
  labels:
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/component: keycloak
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/allow-http: "false"
    nginx.ingress.kubernetes.io/proxy-buffer-size: "128k"
    nginx.ingress.kubernetes.io/proxy-buffers-number: "4"
spec:
  ingressClassName: nginx
  rules:
    - host: amn015287.nomura.com
      http:
        paths:
          - path: /auth
            pathType: Prefix
            backend:
              service:
                name: keycloak
                port:
                  number: 8080
  tls:
    - hosts:
        - amn015287.nomura.com
      secretName: gravitee-tls
